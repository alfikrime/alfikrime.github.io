name: Al Fikri — SEO Page Builder

on:
  push:
    paths:
      - 'articles.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate HTML pages & sitemap
        run: python generate_pages.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ sitemap.xml
          git diff --staged --quiet || git commit -m "🤖 Auto: SEO pages generated"
          git push
