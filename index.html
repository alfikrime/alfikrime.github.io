<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>চিন্তার আঙিনা | Al Fikri</title>
<meta name="description" content="দর্শন, কালাম, বিজ্ঞান, সভ্যতা, মনোবিজ্ঞান ও সাহিত্য।"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
html,body{margin:0;padding:0;width:100%;overflow-x:hidden;background:#f5f2ec;font-family:'EB Garamond','Georgia',serif;color:#1c1c1c;-webkit-text-size-adjust:100%}
*,*::before,*::after{box-sizing:border-box}
:root{--ink:#1a1612;--cream:#f5f2ec;--parchment:#ede8de;--border:#d6cfc2;--accent:#5c3d1e;--accent-light:#8b5e2f;--muted:#888070;--white:#fff;--gold:#b8933f}
#rpbar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--gold));width:0%;z-index:9999;transition:width .08s linear;pointer-events:none}
.body{max-width:680px}
.body p{font-family:'EB Garamond',Georgia,serif;font-size:clamp(17px,2.6vw,19px);line-height:1.95;color:#221e18;margin:0 0 1.1em 0;text-align:justify;word-break:break-word;hyphens:auto}
.body .sec-head{font-family:'Playfair Display',serif;font-size:clamp(17px,3vw,21px);font-weight:600;color:var(--ink);margin:2em 0 .5em;border-left:4px solid var(--accent);padding-left:12px}
.body .divider{text-align:center;color:var(--border);letter-spacing:.6em;font-size:13px;margin:1.8em 0;user-select:none}
.body .wager-item{padding:9px 14px 9px 18px;border-left:3px solid var(--border);margin:4px 0;font-size:clamp(15px,2.4vw,17px);color:#333;line-height:1.7}
.body .wager-item.good{border-color:var(--gold);background:rgba(184,147,63,.06)}
.body .wager-item.bad{border-color:#b05020;background:rgba(176,80,32,.05)}
.body p.dropcap::first-letter{font-family:'Playfair Display',serif;font-size:4em;font-weight:700;float:left;line-height:.8;margin-right:.07em;margin-top:.05em;color:var(--accent)}
.refs{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:20px 24px;margin-bottom:24px}
.refs h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);color:var(--ink)}
.ref{padding:8px 0;border-bottom:1px solid var(--parchment);font-size:13px;line-height:1.85;color:#444;word-break:break-word;font-family:'EB Garamond',serif}
.ref:last-child{border-bottom:none}
.ref a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent-light)}
.ref a:hover{border-bottom-style:solid}
.ref .ref-note{display:block;color:var(--muted);font-size:12px;margin-top:3px;font-style:italic}
.a-title{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,38px);font-weight:700;line-height:1.2;margin:14px 0 8px;letter-spacing:-.02em}
.a-meta{display:flex;gap:14px;font-size:13px;color:var(--muted);font-family:sans-serif;flex-wrap:wrap;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.read-badge{display:inline-flex;align-items:center;gap:4px;background:var(--parchment);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;font-family:sans-serif;color:var(--accent)}
/* NEXT / RELATED ARTICLES */
.next-section{margin-top:40px;padding-top:28px;border-top:2px solid var(--border)}
.next-label{font-family:sans-serif;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
.next-cards{display:flex;flex-direction:column;gap:12px}
.next-card{display:block;background:var(--white);border:1px solid var(--border);border-radius:4px;padding:16px 18px;cursor:pointer;transition:border-color .2s,box-shadow .2s;text-decoration:none}
.next-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(92,61,30,.08)}
.next-card-badge{font-size:10px;font-family:sans-serif;letter-spacing:1px;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
.next-card-title{font-family:'Playfair Display',serif;font-size:clamp(15px,2.8vw,18px);font-weight:600;color:var(--ink);line-height:1.35;margin-bottom:6px}
.next-card-abs{font-family:'EB Garamond',serif;font-size:13px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.next-card-arrow{font-size:13px;color:var(--accent);margin-top:10px;font-family:sans-serif}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .35s ease forwards}
.fi{animation:fadeIn .3s ease forwards}

/* WRAP */
.W{width:100%;max-width:1140px;margin:0 auto;padding:0 16px}
@media(min-width:640px){.W{padding:0 24px}}
@media(min-width:1024px){.W{padding:0 32px}}

/* HEADER */
header{background:var(--white);border-bottom:2px solid var(--ink);position:sticky;top:0;z-index:300;width:100%}
.h-top{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.h-info{font-size:10px;color:var(--muted);font-family:sans-serif}
.h-langs{display:flex;gap:4px}
.lb{cursor:pointer;padding:4px 10px;border-radius:2px;font-size:11px;font-family:sans-serif;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .18s}
.lb.on{background:var(--ink);color:var(--white);border-color:var(--ink)}
.h-brand{text-align:center;padding:16px 0 12px;cursor:pointer}
.h-title{font-family:'Playfair Display',serif;font-weight:700;line-height:1.1;color:var(--ink);font-size:clamp(24px,6vw,44px);display:block}
.h-tag{font-size:clamp(10px,2vw,12px);color:var(--muted);margin-top:5px;letter-spacing:2px;font-style:italic;display:block}

/* DESKTOP NAV — hidden on mobile */
.d-nav{border-top:1px solid var(--border);display:none}
@media(min-width:768px){.d-nav{display:block}}
.d-nav-in{display:flex;justify-content:center;overflow-x:auto}
.ni{padding:10px 15px;font-size:11px;font-family:sans-serif;letter-spacing:.7px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;text-transform:uppercase;transition:all .18s}
.ni:hover{color:var(--accent)}
.ni.on{color:var(--ink);border-bottom-color:var(--accent)}

/* MOBILE NAV — hidden on desktop */
.m-nav{display:flex;justify-content:flex-end;align-items:center;border-top:1px solid var(--border);padding:8px 0}
@media(min-width:768px){.m-nav{display:none}}
.hbg{background:none;border:1px solid var(--border);padding:6px 12px;cursor:pointer;font-size:16px;border-radius:2px;color:var(--ink)}
.m-menu{background:var(--white);border-bottom:2px solid var(--ink);animation:slideDown .2s ease;width:100%}
.m-mi{display:block;width:100%;padding:14px 16px;font-size:15px;font-family:sans-serif;text-align:left;background:none;border:none;border-bottom:1px solid var(--parchment);cursor:pointer;color:var(--ink)}
.m-mi:active{background:var(--parchment)}
.m-mi.on{color:var(--accent);font-weight:600}

/* GRID */
.grid{display:grid;grid-template-columns:1fr;gap:28px;padding:22px 0 48px;width:100%}
@media(min-width:900px){.grid{grid-template-columns:1fr 256px;gap:44px}}

/* MOBILE CAT PILLS */
.m-cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:18px;-webkit-overflow-scrolling:touch;scrollbar-width:none;width:100%}
.m-cats::-webkit-scrollbar{display:none}
@media(min-width:900px){.m-cats{display:none}}
.mc-btn{flex-shrink:0;padding:7px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-family:sans-serif;background:var(--white);cursor:pointer;color:var(--muted);white-space:nowrap;transition:all .18s}
.mc-btn.on{background:var(--accent);color:var(--white);border-color:var(--accent)}

/* SECTION HEAD */
.s-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;width:100%}
.s-head h2{font-family:'Playfair Display',serif;font-size:clamp(17px,4vw,20px);font-weight:400;border-left:4px solid var(--accent);padding-left:12px}
.s-cnt{font-size:12px;color:var(--muted);font-family:sans-serif}

/* CAT HEADER */
.c-head{border-left:5px solid var(--accent);padding-left:13px;margin-bottom:22px}
.c-head h2{font-family:'Playfair Display',serif;font-size:clamp(19px,5vw,25px);font-weight:400}
.c-head p{font-size:13px;color:var(--muted);margin-top:4px;font-style:italic}

/* EMPTY STATE */
.empty{text-align:center;padding:50px 20px;width:100%}
.empty-ico{font-size:44px;margin-bottom:14px;opacity:.4;display:block}
.empty-t{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:8px}
.empty-p{font-size:15px;line-height:1.8;font-style:italic;color:var(--muted);max-width:300px;margin:0 auto}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:18px;margin-bottom:12px;cursor:pointer;width:100%;transition:box-shadow .2s}
@media(min-width:640px){.card{padding:24px}}
@media(hover:hover){.card:hover{box-shadow:0 4px 18px rgba(92,61,30,.1)}}
.card:active{background:var(--parchment)}
.c-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.c-date{font-size:11px;color:var(--muted);font-family:sans-serif}
.c-title{font-family:'Playfair Display',serif;font-size:clamp(17px,4vw,21px);font-weight:700;line-height:1.35;margin-bottom:9px;color:var(--ink)}
.c-abs{font-size:clamp(14px,3vw,16px);line-height:1.78;color:#444;margin-bottom:12px}
.c-foot{display:flex;justify-content:space-between;align-items:center}
.c-auth{font-size:13px;color:var(--muted);font-style:italic}
.c-read{font-size:12px;color:var(--accent);font-family:sans-serif;font-weight:600}
.pill{display:inline-block;padding:3px 10px;border-radius:1px;font-size:10px;font-family:sans-serif;letter-spacing:1.5px;text-transform:uppercase;background:var(--parchment);color:var(--accent);border:1px solid var(--border)}

/* DETAIL */
.back{background:none;border:1px solid var(--border);padding:8px 16px;font-size:12px;cursor:pointer;font-family:sans-serif;color:var(--muted);margin-bottom:20px;border-radius:2px}
.back:active{background:var(--parchment)}
.a-title{font-family:'Playfair Display',serif;font-size:clamp(21px,5vw,34px);font-weight:700;line-height:1.28;margin:12px 0}
.a-meta{display:flex;gap:12px;font-size:13px;color:var(--muted);font-family:sans-serif;flex-wrap:wrap;margin-bottom:20px}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.abs-box{background:var(--parchment);border-left:4px solid var(--accent);padding:14px 16px;margin-bottom:20px;border-radius:0 3px 3px 0}
.abs-lbl{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);font-family:sans-serif;font-weight:700;margin-bottom:7px}
.abs-txt{font-size:clamp(13px,3vw,15px);line-height:1.9;color:#444;font-style:italic}
.tags{margin-bottom:20px}
.tag{display:inline-block;background:var(--parchment);color:var(--accent);padding:3px 9px;font-size:11px;margin:2px;font-family:sans-serif;border:1px solid var(--border);border-radius:1px}
.body p{font-size:clamp(16px,3vw,18px);line-height:2.05;color:#222;margin-bottom:20px;text-align:justify;word-break:break-word}
.refs{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:18px;margin-bottom:24px}
.refs h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.ref{padding:6px 0;border-bottom:1px solid var(--parchment);font-size:13px;line-height:1.7;color:#555;word-break:break-word}
.sh-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.sh-btn{padding:10px 14px;border:1px solid var(--border);font-size:12px;background:var(--white);font-family:sans-serif;cursor:pointer;border-radius:2px;min-height:40px}
.sh-btn:active{background:var(--parchment)}

/* SIDEBAR */
.sb{display:none}
@media(min-width:900px){.sb{display:block}}
.sb-bl{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:16px;margin-bottom:16px}
.sb-lbl{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);font-family:sans-serif;font-weight:700;margin-bottom:12px;display:block}
.s-row{display:flex;gap:6px}
.s-in{flex:1;border:1px solid var(--border);padding:8px 10px;font-size:13px;font-family:sans-serif;background:var(--cream);outline:none;border-radius:2px}
.s-in:focus{border-color:var(--accent)}
.s-go{background:var(--ink);color:var(--white);border:none;padding:8px 12px;cursor:pointer;font-size:14px;border-radius:2px}
.cat-r{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--parchment);font-size:13px;cursor:pointer;color:var(--ink);transition:color .18s}
.cat-r:hover{color:var(--accent)}
.cat-n{background:var(--parchment);color:var(--accent);padding:1px 8px;border-radius:10px;font-size:11px;font-family:sans-serif}
.rec{padding:10px 0;border-bottom:1px solid var(--parchment);cursor:pointer}
.rec-t{font-size:13px;line-height:1.5;color:var(--ink);margin-bottom:2px;transition:color .18s}
.rec:hover .rec-t{color:var(--accent)}
.rec-d{font-size:11px;color:var(--muted);font-family:sans-serif}

/* PAGE WRAP */
.pg{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:clamp(18px,5vw,34px);width:100%}
.av{width:76px;height:76px;border-radius:50%;background:var(--parchment);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px;border:2px solid var(--border)}
.pg-name{font-family:'Playfair Display',serif;font-size:clamp(21px,5vw,27px);margin-bottom:5px}
.pg-sub{font-size:12px;color:var(--muted);font-family:sans-serif;letter-spacing:1px;margin-bottom:18px}
.pg-body p{font-size:clamp(14px,3vw,16px);line-height:1.95;color:#444;margin-bottom:13px;word-break:break-word}
.pg-links{margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.pg-link{font-size:14px;margin-bottom:9px;font-family:sans-serif}

/* FOOTER */
footer{background:var(--ink);color:#999;padding:38px 0 18px;margin-top:44px;width:100%}
.f-grid{display:grid;grid-template-columns:1fr;gap:24px;margin-bottom:24px}
@media(min-width:600px){.f-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.f-grid{grid-template-columns:repeat(3,1fr)}}
.f-head{color:#fff;font-family:'Playfair Display',serif;font-size:17px;margin-bottom:11px}
.f-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:sans-serif;color:#666;margin-bottom:9px}
.f-lnk{font-size:13px;padding:3px 0;display:block;color:#999;cursor:pointer;transition:color .18s;text-decoration:none;word-break:break-all}
.f-lnk:hover{color:#ddd}
.f-bot{border-top:1px solid #2a2a2a;padding-top:16px;text-align:center;font-size:11px;font-family:sans-serif}
</style>
</head>
<body>
<div id="rpbar"></div>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

const CATS=[
  {id:'philosophy',bn:'দর্শন ও কালাম',         en:'Philosophy & Theology',    desc:'ঈশ্বর, অস্তিত্ব, তাওহীদ ও secular ethics-এর প্রশ্নমালা'},
  {id:'science',   bn:'বিজ্ঞান ও নৈতিকতা',    en:'Science & Ethics',         desc:'প্রতিভা, নৈতিক ব্যর্থতা এবং বিজ্ঞানের সীমার অনুসন্ধান'},
  {id:'history',   bn:'সভ্যতা ও ইতিহাস',      en:'Civilization & History',   desc:'আলোকায়ন, যুদ্ধ, ইসলামি সভ্যতা — তুলনামূলক বিশ্লেষণ'},
  {id:'psychology',bn:'মনোবিজ্ঞান ও মানবআচরণ',en:'Psychology & Human Nature','desc':'আসক্তি, সম্পর্ক, আত্মপরিচয় ও মানবিক দুর্বলতা'},
  {id:'literature',bn:'সাহিত্য ও কবিতা',      en:'Literature & Poetry',      desc:'কাব্যিক গদ্য, প্রতিফলন এবং জীবনের কাব্য'},
];

// articles.json থেকে লোড হবে
let ARTICLES = [];
let _articlesReady = false;

// Root এ render করার আগে articles লোড করবো
async function _loadArticles() {
  try {
    const res = await fetch('articles.json');
    ARTICLES = await res.json();
  } catch(e) {
    console.error('articles.json লোড হয়নি:', e);
    ARTICLES = [];
  }
  _articlesReady = true;
}

function Header({page,setPage,activeCat,setActiveCat,lang,setLang}){
  const [open,setOpen]=useState(false);
  const bn=lang==='bn';
  const nav=[
    {id:'home',  label:bn?'প্রচ্ছদ':'Home'},
    {id:'about', label:bn?'লেখক পরিচিতি':'About'},
    {id:'contact',label:bn?'যোগাযোগ':'Contact'},
    ...CATS.map(c=>({id:'c_'+c.id,catId:c.id,label:bn?c.bn:c.en})),
  ];
  const go=(item)=>{
    if(item.catId){setPage('cat');setActiveCat(item.catId);}
    else setPage(item.id);
    setOpen(false);
    window.scrollTo(0,0);
  };
  const isOn=(item)=>item.catId?page==='cat'&&activeCat===item.catId:page===item.id;
  return(
    <header>
      <div className="W">
        <div className="h-top">
          <span className="h-info">Al Fikri · alfikri.netlify.app</span>
          <div className="h-langs">
            <button className={'lb'+(lang==='bn'?' on':'')} onClick={()=>setLang('bn')}>বাংলা</button>
            <button className={'lb'+(lang==='en'?' on':'')} onClick={()=>setLang('en')}>EN</button>
          </div>
        </div>
        <div className="h-brand" onClick={()=>{setPage('home');setOpen(false);window.scrollTo(0,0);}}>
          <span className="h-title">{bn?'চিন্তার আঙিনা':'The Thinking Space'}</span>
          <span className="h-tag">{bn?'দর্শন · কালাম · ইতিহাস · মনোবিজ্ঞান · সাহিত্য':'Philosophy · Theology · History · Psychology · Literature'}</span>
        </div>
        {/* Desktop nav */}
        <nav className="d-nav">
          <div className="d-nav-in">
            {nav.map(n=><span key={n.id} className={'ni'+(isOn(n)?' on':'')} onClick={()=>go(n)}>{n.label}</span>)}
          </div>
        </nav>
        {/* Mobile nav */}
        <div className="m-nav">
          <button className="hbg" onClick={()=>setOpen(!open)}>{open?'✕':'☰'}</button>
        </div>
      </div>
      {open&&(
        <div className="m-menu">
          {nav.map(n=>(
            <button key={n.id} className={'m-mi'+(isOn(n)?' on':'')} onClick={()=>go(n)}>{n.label}</button>
          ))}
        </div>
      )}
    </header>
  );
}

function Sidebar({lang,openArticle,setPage,setActiveCat}){
  const bn=lang==='bn';
  const [q,setQ]=useState('');
  return(
    <aside className="sb">
      <div className="sb-bl">
        <span className="sb-lbl">{bn?'অনুসন্ধান':'Search'}</span>
        <div className="s-row">
          <input className="s-in" value={q} onChange={e=>setQ(e.target.value)} placeholder={bn?'লেখা খুঁজুন...':'Search...'}/>
          <button className="s-go">→</button>
        </div>
      </div>
      <div className="sb-bl">
        <span className="sb-lbl">{bn?'বিষয়শ্রেণী':'Categories'}</span>
        {CATS.map(c=>(
          <div key={c.id} className="cat-r" onClick={()=>{setPage('cat');setActiveCat(c.id);window.scrollTo(0,0);}}>
            <span>{bn?c.bn:c.en}</span>
            <span className="cat-n">{ARTICLES.filter(a=>a.cat===c.id).length}</span>
          </div>
        ))}
      </div>
      <div className="sb-bl">
        <span className="sb-lbl">{bn?'সাম্প্রতিক':'Recent'}</span>
        {ARTICLES.length===0
          ?<p style={{fontSize:'13px',color:'var(--muted)',fontStyle:'italic'}}>{bn?'এখনো কোনো লেখা নেই':'No articles yet'}</p>
          :ARTICLES.slice(0,4).map(a=>(
            <div key={a.id} className="rec" onClick={()=>openArticle(a)}>
              <div className="rec-t">{bn?a.title:a.titleEn}</div>
              <div className="rec-d">{bn?a.date:a.dateEn}</div>
            </div>
          ))

      </div>
    </aside>

}

function Empty({bn}){

      <p className="empty-p">{bn?'লেখা প্রকাশিত হলে এখানে দেখা যাবে।':'Articles will appear here once published.'}</p>

function Card({a,lang,onClick}){
  const bn=lang==='bn';
  const cat=CATS.find(c=>c.id===a.cat);
  return(
    <div className="card fu" onClick={()=>onClick(a)}>
      <div className="c-meta">

      </div>
      <h3 className="c-title">{bn?a.title:a.titleEn}</h3>
      <p className="c-abs">{bn?a.abstract:a.abstractEn}</p>

        <span className="c-read">{bn?'পড়ুন →':'Read →'}</span>
      </div>
    </div>

}

function Detail({a,lang,onBack}){
  const bn=lang==='bn';
  const cat=CATS.find(c=>c.id===a.cat);
  const [showEn,setShowEn]=useState(false);

  useEffect(()=>{
    setShowEn(false);
    window.scrollTo({top:0,behavior:'smooth'});
    const bar=document.getElementById('rpbar');
    const onScroll=()=>{
      const el=document.documentElement;
      const pct=el.scrollHeight-el.clientHeight;
      if(bar) bar.style.width=(pct>0?(el.scrollTop/pct*100):0)+'%';
    };
    window.addEventListener('scroll',onScroll);
    return()=>{window.removeEventListener('scroll',onScroll);if(bar)bar.style.width='0%';};
  },[a.id]);

  const allText=(a.bodyParagraphs||[]).filter(b=>b.type==='p').map(b=>b.text).join(' ');
  const mins=Math.max(1,Math.ceil(allText.split(/\s+/).length/180));

  const renderBody=()=>(a.bodyParagraphs||[]).map((b,i)=>{
    const txt=showEn?(b.textEn||b.text):b.text;
    if(b.type==='sec') return <div key={i} className="body"><div className="sec-head">{txt}</div></div>;
    if(b.type==='div') return <div key={i} className="body"><div className="divider">· · ·</div></div>;
    if(b.type==='wager') return(
      <div key={i} className="body" style={{margin:'0 0 1.1em'}}>
        {b.items.map((it,j)=><div key={j} className={'wager-item '+(it.cls||'')}>{showEn?(it.textEn||it.text):it.text}</div>)}
      </div>
    );
    if(b.type==='p') return(
      <div key={i} className="body">
        <p className={b.dropcap?'dropcap':''}>{txt}</p>
      </div>
    );
    return null;
  });
  const renderRefs=()=>{
    if(!a.refs||!a.refs.length) return null;
    return(
      <div className="refs">
        <h3>{bn?'তথ্যসূত্র':'References'}</h3>
        {a.refs.map(r=>(
          <div key={r.num} className="ref">
            <strong>[{r.num}]</strong> {r.text}
            {r.note&&<span className="ref-note">{r.note}</span>}
            {r.links&&r.links.length>0&&(
              <span style={{display:'block',marginTop:'5px'}}>
                {r.links.map((lk,li)=>(
                  <a key={li} href={lk.url} target="_blank" rel="noopener noreferrer" style={{marginRight:'14px'}}>{lk.label} ↗</a>
                ))}
              </span>
            )}
          </div>
        ))}
      </div>
    );
  };
  const renderNext=()=>{
    const idx=ARTICLES.findIndex(x=>x.id===a.id);
    const next=ARTICLES[idx+1]||null;
    const related=ARTICLES.filter(x=>x.id!==a.id&&x.id!==(next?.id)).slice(0,1)[0]||null;
    const cards=[];
    if(next) cards.push({item:next,label:bn?'পরবর্তী পর্ব':'Next Part'});
    else if(related) cards.push({item:related,label:bn?'আরো পড়ুন':'Read Next'});
    if(!cards.length) return null;
    return(
      <div className="next-section">
        <div className="next-label">{bn?'আরো পড়ুন':'Continue Reading'}</div>
        <div className="next-cards">
          {cards.map(({item,label})=>(
            <div key={item.id} className="next-card" onClick={()=>onBack(item)}>
              <div className="next-card-badge">{label}</div>
              <div className="next-card-title">{bn?item.title:item.titleEn}</div>
              {item.abstract&&<div className="next-card-abs">{bn?item.abstract:item.abstractEn}</div>}
              <div className="next-card-arrow">{bn?'পড়ুন →':'Read →'}</div>
            </div>
          ))}
        </div>
      </div>
    );
  };
  return(
    <div className="fi" style={{width:'100%'}}>
      <button className="back" onClick={onBack}>← {showEn?'Back':'ফিরে যান'}</button>
      <div style={{marginBottom:'12px',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
        <span className="pill">{showEn?cat?.en:cat?.bn}</span>
        <span className="read-badge">⏱ {showEn?`${mins} min read`:`${mins} মিনিট`}</span>
        {!showEn
          ?<button onClick={()=>setShowEn(true)} style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:'20px',padding:'5px 14px',fontSize:'11px',fontFamily:'sans-serif',cursor:'pointer',letterSpacing:'.5px'}}>🌐 Read in English</button>
          :<button onClick={()=>setShowEn(false)} style={{background:'var(--parchment)',color:'var(--accent)',border:'1px solid var(--border)',borderRadius:'20px',padding:'5px 14px',fontSize:'11px',fontFamily:'sans-serif',cursor:'pointer',letterSpacing:'.5px'}}>বাংলায় পড়ুন</button>
        }
      </div>
      <h1 className="a-title">{showEn?a.titleEn:a.title}</h1>
      <div className="a-meta">
        <span>✍ কাজী ইবনুল হোসেন</span>
        <span>📅 {showEn?a.dateEn:a.date}</span>
      </div>
      {a.abstract&&(
        <div className="abs-box">
          <div className="abs-lbl">{showEn?'Abstract':'সারসংক্ষেপ'}</div>
          <p className="abs-txt">{showEn?a.abstractEn:a.abstract}</p>
        </div>
      )}
      <div className="tags" style={{marginBottom:'28px'}}>
        {(showEn?a.tagsEn:a.tags).map(t=><span key={t} className="tag">#{t}</span>)}
      </div>
      {renderBody()}
      {renderRefs()}
      <div style={{marginTop:'28px'}}>
        <div style={{fontSize:'11px',color:'var(--muted)',fontFamily:'sans-serif',letterSpacing:'1px',marginBottom:'8px'}}>{showEn?'Share':'শেয়ার করুন'}</div>
        <div className="sh-row">
          <button className="sh-btn" onClick={()=>{navigator.clipboard.writeText(window.location.href);alert(showEn?'Copied!':'লিংক কপি!');}}>🔗 {showEn?'Copy':'কপি'}</button>
          <button className="sh-btn" onClick={()=>window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(showEn?a.titleEn:a.title))}>𝕏</button>
          <button className="sh-btn" onClick={()=>window.open('https://www.facebook.com/sharer/sharer.php?u='+window.location.href)}>Facebook</button>
          <button className="sh-btn" onClick={()=>window.print()}>🖨</button>
        </div>
      </div>
      {renderNext()}
    </div>
  );
}

function Home({lang,openArticle,activeCat,setActiveCat,setPage}){
  const bn=lang==='bn';
  return(
    <div className="fi" style={{width:'100%'}}>
      <MCats lang={lang} activeCat={activeCat} setActiveCat={setActiveCat} setPage={setPage}/>
      <div className="s-head">
        <h2>{bn?'সর্বশেষ প্রকাশনা':'Latest Publications'}</h2>
        <span className="s-cnt">{bn?`${ARTICLES.length}টি প্রবন্ধ`:`${ARTICLES.length} Essays`}</span>
      </div>
      {ARTICLES.length===0?<Empty bn={bn}/>:ARTICLES.map(a=><Card key={a.id} a={a} lang={lang} onClick={openArticle}/>)}
    </div>
  );
}

function CatPage({catId,lang,openArticle,setActiveCat,setPage}){
  const bn=lang==='bn';
  const cat=CATS.find(c=>c.id===catId);
  const arts=ARTICLES.filter(a=>a.cat===catId);
  return(
    <div className="fi" style={{width:'100%'}}>
      <MCats lang={lang} activeCat={catId} setActiveCat={setActiveCat} setPage={setPage}/>
      <div className="c-head">
        <h2>{bn?cat?.bn:cat?.en}</h2>
        <p>{cat?.desc}</p>
      </div>
      {arts.length===0?<Empty bn={bn}/>:arts.map(a=><Card key={a.id} a={a} lang={lang} onClick={openArticle}/>)}
    </div>
  );
}

function About({lang}){
  const bn=lang==='bn';
  return(
    <div className="fi">
      <div className="pg">
        <div className="av">✍</div>
        <h2 className="pg-name">{bn?'কাজী ইবনুল হোসেন':'Kazi Ibnul Hossain'}</h2>
        <div className="pg-body">
          <p>আমি দার্শনিক নই। একদম সাধারণ কেউ। বিজ্ঞান নিয়ে পড়েছি। গণিত ছিল পরিবারের পছন্দের বিষয়। কিন্তু ভালো লাগতো ফিজিক্স। বিশেষত কসমোলজি।</p>
          <p>আমার কৈশোরে সাহিত্যে বুদ হয়ে থেকেছি যতটা, যৌবনের প্রারম্ভে ঠিক ততটাই পদার্থবিজ্ঞানের নানা তত্ত্বেও ডুবে থেকেছি। তবুও অনার্স করতে হয়েছে গণিত নিয়ে। আমি তখন ভিন্ন জগতে। গণিতের বই পাশে সরিয়ে রেখে দর্শন ও ধর্মতত্ত্বে অবগাহন করছি।</p>
          <p>মধ্যযৌবনে এসব জানাশোনার বাইরে ভিন্ন জগৎ সামনে এলে — সমগ্র সৃষ্টি, মানব মনস্তত্ত্বের নিগুঢ় রহস্যের সন্ধানে প্রবৃত্ত হলাম। নানা বিচ্ছিন্ন ভাবনা — কখনো গভীর, কখনো অগভীর — এর মধ্য দিয়ে গিয়েছি। আমার ভাবনাগুলো কতটা সঠিক? এই প্রশ্নের সন্ধানে কিছু তথ্য খোঁজা শুরু করলাম — প্রবলেম-ওরিয়েন্টেড রিডিং।</p>
          <p>দীর্ঘ দশ বছর আমি যেসব ভাবনা কল্পনার মধ্য দিয়ে গিয়েছি — সেসব আপাত বিচ্ছিন্ন — কিন্তু অবিচ্ছিন্ন ভাবনাগুলো প্রকাশের জায়গা এই ওয়েবসাইট।</p>
          <p>এগুলো একান্তই আমার। কেউ এর দ্বারা নিজের ভাবনার উৎকর্ষে পৌঁছুলে এটা তাঁর বদন্যতা।</p>
        </div>
      </div>
    </div>
  );
}

function Contact({lang}){
  const bn=lang==='bn';
  return(
    <div className="fi">
      <div className="pg">
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(21px,5vw,27px)',marginBottom:'20px'}}>{bn?'যোগাযোগ':'Contact'}</h2>
        <div className="pg-body">
          <p>📧 yourname@email.com</p>
          <p>🔗 ORCID: 0000-0000-0000-0000</p>
          <p>🎓 Google Scholar: {bn?'লিংক যোগ করুন':'Add your link'}</p>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [lang,setLang]=useState('bn');
  const [page,setPage]=useState('home');
  const [activeCat,setActiveCat]=useState('philosophy');
  const [article,setArticle]=useState(null);
  const openArticle=useCallback(a=>{setArticle(a);setPage('article');window.scrollTo(0,0);},[]);
  return(
    <>
      <Header page={page} setPage={setPage} activeCat={activeCat} setActiveCat={setActiveCat} lang={lang} setLang={setLang}/>
      <div className="W">
        <div className="grid">
          <main style={{width:'100%',minWidth:0}}>
            {page==='home'    &&<Home     lang={lang} openArticle={openArticle} activeCat={activeCat} setActiveCat={setActiveCat} setPage={setPage}/>}
            {page==='cat'     &&<CatPage  lang={lang} catId={activeCat} openArticle={openArticle} setActiveCat={setActiveCat} setPage={setPage}/>}
            {page==='article' &&article  &&<Detail a={article} lang={lang} onBack={(next)=>{if(next&&next.id){openArticle(next);}else{setPage('home');}}}/>}
            {page==='about'   &&<About   lang={lang}/>}
            {page==='contact' &&<Contact lang={lang}/>}
          </main>
          <Sidebar lang={lang} openArticle={openArticle} setPage={setPage} setActiveCat={setActiveCat}/>
        </div>
      </div>
      <footer>
        <div className="W">
          <div className="f-grid">
            <div>
              <div className="f-head">{lang==='bn'?'চিন্তার আঙিনা':'The Thinking Space'}</div>
              <p style={{fontSize:'13px',lineHeight:'1.9'}}>{lang==='bn'?'দর্শন, কালাম, ইতিহাস, মনোবিজ্ঞান ও সাহিত্যের মেলবন্ধনে লেখার প্রচেষ্টা।':'Writing at the intersection of philosophy, theology, history, psychology and literature.'}</p>
            </div>
            <div>
              <div className="f-sub">{lang==='bn'?'বিষয়শ্রেণী':'Categories'}</div>
              {CATS.map(c=>(
                <span key={c.id} className="f-lnk" onClick={()=>{setPage('cat');setActiveCat(c.id);window.scrollTo(0,0);}}>
                  {lang==='bn'?c.bn:c.en}
                </span>
              ))}
            </div>
            <div>
              <div className="f-sub">Links</div>
              <span className="f-lnk">Google Scholar</span>
              <span className="f-lnk">ResearchGate</span>
            </div>
          </div>
          <div className="f-bot">© ২০২৬ কাজী ইবনুল হোসেন &nbsp;·&nbsp; {lang==='bn'?'সর্বস্বত্ব সংরক্ষিত':'All Rights Reserved'}</div>
        </div>
      </footer>
    </>
  );
}

_loadArticles().then(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
});
</script>
</body>
